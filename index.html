<div className="card" style={{padding:22,textAlign:'center',marginBottom:10}}><div style={{width:56,height:56,borderRadius:28,background:'var(--em-l)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,margin:'0 auto 8px'}}>{u.av}</div><h2 style={{fontSize:18,fontWeight:800}}>{u.name}{u.vf?' ✅':''}</h2><p style={{fontSize:12,color:'var(--text2)'}}>{u.pos}·{u.dept}</p><p style={{fontSize:14,fontWeight:600,color:'var(--em)'}}>{u.co}</p><div style={{display:'flex',justifyContent:'center',gap:16,margin:'10px 0',padding:'10px 0',borderTop:'1px solid var(--bg2)',borderBottom:'1px solid var(--bg2)'}}><div><div style={{fontWeight:800,fontSize:16,color:'var(--em)'}}>{u.rate}%</div><div style={{fontSize:10,color:'var(--text3)'}}>수락률</div></div><div><div style={{fontWeight:800,fontSize:16}}>📞</div><div style={{fontSize:10,color:'var(--text3)'}}>***-****</div></div></div>{u.bio&&<p style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>{u.bio}</p>}<button className="btn btn-p btn-w btn-lg" onClick={()=>smod('request')}>🤝 연락처 요청하기</button></div>
{hi&&<div className="card" style={{padding:14,marginBottom:10}}><h4 style={{fontSize:13,fontWeight:700,marginBottom:8}}>🤝 소개 경로</h4><div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}><div style={{padding:'5px 10px',background:'var(--em-l)',borderRadius:18,fontSize:11,fontWeight:600}}>😎 나</div><span style={{color:'var(--text3)',fontSize:12}}>→</span><div style={{padding:'5px 10px',background:'var(--blue-l)',borderRadius:18,fontSize:11,fontWeight:600}}>👨‍💼 오승민</div><span style={{color:'var(--text3)',fontSize:12}}>→</span><div style={{padding:'5px 10px',background:'var(--purple-l)',borderRadius:18,fontSize:11,fontWeight:600}}>{u.av} {u.name}</div></div><p style={{fontSize:10,color:'var(--text2)',marginTop:6}}>오승민님을 통해 소개받을 수 있습니다</p><button className="btn btn-o btn-sm btn-w" style={{marginTop:6}} onClick={()=>smod('intro')}>소개 요청하기</button></div>}
{og&&<div className="card" style={{padding:14,marginBottom:10}}><h4 style={{fontSize:13,fontWeight:700,marginBottom:8}}>🏢 {u.dept} 조직도</h4>{og.map((m,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',paddingLeft:m.l*18,borderBottom:i<og.length-1?'1px solid var(--bg2)':'none'}}><div style={{width:28,height:28,borderRadius:14,background:m.n===u.name?'var(--em-l)':'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,border:m.n===u.name?'2px solid var(--em)':'none'}}>{m.a}</div><div><div style={{fontWeight:m.n===u.name?700:500,fontSize:12,color:m.n===u.name?'var(--em-d)':'var(--text)'}}>{m.n}{m.n===u.name?' ←':''}</div><div style={{fontSize:10,color:'var(--text3)'}}>{m.p}</div></div>{m.l===0&&<span className="badge b-or" style={{marginLeft:'auto',fontSize:9}}>결정권자</span>}</div>)}</div>}
</div>);}

function OrgPg(){const{sp,sel}=useApp();const co=sel?.co||'삼성전자';const d=OG[co]||{};return(<div style={{paddingTop:14}}><button className="btn btn-g btn-sm" onClick={()=>sp('user-detail')} style={{marginBottom:10}}>←</button><h2 style={{fontSize:18,fontWeight:800,marginBottom:12}}>🏢 {co} 조직도</h2>{Object.entries(d).map(([dept,ms])=><div key={dept} className="card" style={{padding:14,marginBottom:8}}><h4 style={{fontWeight:700,fontSize:13,marginBottom:8}}>📁 {dept} ({ms.length}명)</h4>{ms.map((m,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',paddingLeft:m.l*20}}>{m.l>0&&<span style={{color:'var(--bg3)',fontSize:11}}>└</span>}<div style={{width:28,height:28,borderRadius:14,background:m.l===0?'var(--orange-l)':'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>{m.a}</div><div><div style={{fontWeight:600,fontSize:12}}>{m.n}</div><div style={{fontSize:10,color:'var(--text3)'}}>{m.p}</div></div>{m.l===0&&<span className="badge b-or" style={{marginLeft:'auto',fontSize:9}}>결정권자</span>}</div>)}</div>)}</div>);}

function IntroM(){const{sel:u,smod,st}=useApp();return(<div className="modal-ov" onClick={()=>smod(null)}><div className="modal-ct" onClick={e=>e.stopPropagation()} style={{padding:22}}><h3 style={{fontSize:16,fontWeight:800,marginBottom:12}}>🤝 소개 요청</h3><p style={{fontSize:12,color:'var(--text2)',marginBottom:14}}>오승민님에게 {u.name}님 소개 요청</p><div style={{background:'var(--bg2)',borderRadius:'var(--rs)',padding:12,marginBottom:14,display:'flex',alignItems:'center',gap:4,justifyContent:'center',fontSize:12}}><span style={{padding:'4px 10px',background:'var(--em-l)',borderRadius:14}}>😎나</span>→<span style={{padding:'4px 10px',background:'var(--blue-l)',borderRadius:14}}>👨‍💼오승민</span>→<span style={{padding:'4px 10px',background:'var(--purple-l)',borderRadius:14}}>{u.av}{u.name}</span></div><div style={{marginBottom:14}}><span className="inp-label">메시지</span><textarea className="inp" placeholder="소개 요청..." rows={3} style={{resize:'none',marginTop:4}}/></div><div style={{display:'flex',gap:8}}><button className="btn btn-o" style={{flex:1}} onClick={()=>smod(null)}>취소</button><button className="btn btn-p" style={{flex:2}} onClick={()=>{st('✅ 소개 요청!');smod(null)}}>보내기</button></div></div></div>);}

function UpgM(){const{smod,sp}=useApp();return(<div className="modal-ov" onClick={()=>smod(null)}><div className="modal-ct" onClick={e=>e.stopPropagation()} style={{padding:22,textAlign:'center'}}><div style={{fontSize:44,marginBottom:10}}>🔓</div><h3 style={{fontSize:18,fontWeight:800,marginBottom:6}}>Pro 업그레이드</h3><p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>조회자·인텐트·이직알림·조직도·소개경로 모두</p><div style={{background:'var(--em-xl)',borderRadius:'var(--rs)',padding:12,marginBottom:14}}><div style={{fontSize:26,fontWeight:800}}>29,000원<span style={{fontSize:13,fontWeight:400,color:'var(--text2)'}}>/월</span></div><div style={{fontSize:11,color:'var(--em-d)'}}>7일 무료·언제든 해지</div></div>{['👀 조회자 이름','🔥 인텐트 담당자','🔔 이직 알림','🏢 조직도','🤝 소개 경로'].map((f,i)=><div key={i} style={{display:'flex',gap:6,marginBottom:5,fontSize:12,color:'var(--text2)',textAlign:'left'}}><span style={{color:'var(--em)'}}>✓</span>{f}</div>)}<button className="btn btn-p btn-w btn-lg" style={{marginTop:14}} onClick={()=>{smod(null);sp('pricing')}}>Pro시작→</button></div></div>);}

function ReqM(){const{sel:u,sendR,smod}=useApp();const[pur,sP]=useState('');const[msg,sM]=useState('');return(<div className="modal-ov" onClick={()=>smod(null)}><div className="modal-ct" onClick={e=>e.stopPropagation()} style={{padding:22}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}><h3 style={{fontSize:16,fontWeight:800}}>🤝 연락처 요청</h3><button onClick={()=>smod(null)} style={{fontSize:16,color:'var(--text3)'}}>✕</button></div><div style={{background:'var(--bg2)',borderRadius:'var(--rs)',padding:10,marginBottom:12,display:'flex',alignItems:'center',gap:8}}><div style={{width:32,height:32,borderRadius:16,background:'var(--em-l)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{u.av}</div><div><div style={{fontWeight:700,fontSize:13}}>{u.name}·{u.pos}</div><div style={{fontSize:11,color:'var(--text2)'}}>{u.co}</div></div></div><div style={{marginBottom:10}}><span className="inp-label">목적*</span><div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:4}}>{PP.map(p=><button key={p.k} onClick={()=>sP(p.k)} style={{padding:'5px 11px',borderRadius:16,fontSize:11,fontWeight:600,border:'2px solid',cursor:'pointer',borderColor:pur===p.k?p.c:'var(--bg3)',background:pur===p.k?p.bg:'var(--card)',color:pur===p.k?p.c:'var(--text2)'}}>{p.i}{p.l}</button>)}</div></div><div style={{marginBottom:14}}><span className="inp-label">메시지</span><textarea className="inp" value={msg} onChange={e=>sM(e.target.value)} placeholder="요청 사유" rows={2} maxLength={100} style={{resize:'none',marginTop:4}}/></div><div style={{display:'flex',gap:8}}><button className="btn btn-o" style={{flex:1}} onClick={()=>smod(null)}>취소</button><button className="btn btn-p" style={{flex:2}} onClick={()=>sendR(u,pur,msg)} disabled={!pur}>보내기→</button></div></div></div>);}

function Inbox(){const{recv,acc,rej}=useApp();const[tab,sT]=useState('PENDING');const fl=recv.filter(r=>tab==='ALL'||r.st===tab);return(<div style={{paddingTop:16}}><h2 style={{fontSize:18,fontWeight:800,marginBottom:12}}>📨 수신함</h2><div className="tab-bar" style={{marginBottom:12}}>{[{k:'PENDING',l:'미응답'},{k:'ACCEPTED',l:'수락'},{k:'REJECTED',l:'거부'},{k:'ALL',l:'전체'}].map(t=><div key={t.k} className={`tab-i ${tab===t.k?'on':''}`} onClick={()=>sT(t.k)}>{t.l}</div>)}</div>{fl.length===0?<div style={{textAlign:'center',padding:36,color:'var(--text3)'}}><div style={{fontSize:36}}>📭</div><p style={{fontWeight:600,color:'var(--text2)',marginTop:6}}>없어요</p></div>:fl.map((r,i)=>{const p=gp(r.pur);return(<div key={r.id} className="card au" style={{padding:13,marginBottom:7,animationDelay:`${i*50}ms`}}><div style={{display:'flex',alignItems:'flex-start',gap:9}}><div style={{width:36,height:36,borderRadius:18,background:p.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,flexShrink:0}}>{r.ra}</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}><span style={{fontWeight:700,fontSize:13}}>{r.rn}</span><span className={`badge ${p.bc}`} style={{fontSize:10}}>{p.i}{p.l}</span></div><div style={{fontSize:11,color:'var(--text2)'}}>{r.rc}·{r.rd}</div>{r.msg&&<div style={{fontSize:11,marginTop:4,padding:'4px 7px',background:'var(--bg2)',borderRadius:5,fontStyle:'italic'}}>"{r.msg}"</div>}</div></div>{r.st==='PENDING'&&<div style={{display:'flex',gap:6,marginTop:8}}><button className="btn btn-o btn-sm" style={{flex:1,color:'var(--red)'}} onClick={()=>rej(r.id)}>거부</button><button className="btn btn-p btn-sm" style={{flex:2}} onClick={()=>acc(r.id)}>✅수락</button></div>}{r.st==='ACCEPTED'&&<div style={{marginTop:6,padding:'5px 8px',background:'var(--em-l)',borderRadius:5,fontSize:10,color:'var(--em-d)',fontWeight:600}}>🎉연결!</div>}{r.st==='REJECTED'&&<div style={{marginTop:6,fontSize:10,color:'var(--text3)'}}>거절됨</div>}</div>)})}</div>);}

function Sent(){const{sent}=useApp();return(<div style={{paddingTop:16}}><h2 style={{fontSize:18,fontWeight:800,marginBottom:12}}>📤 보낸 요청</h2>{sent.length===0?<div style={{textAlign:'center',padding:36,color:'var(--text3)'}}><div style={{fontSize:36}}>📮</div><p style={{fontWeight:600,color:'var(--text2)',marginTop:6}}>없어요</p></div>:sent.map((r,i)=>{const p=gp(r.pur);return(<div key={r.id} className="card au" style={{padding:13,marginBottom:7,animationDelay:`${i*50}ms`,display:'flex',alignItems:'center',gap:9}}><div style={{width:36,height:36,borderRadius:18,background:p.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>{r.ta}</div><div style={{flex:1}}><div style={{fontWeight:700,fontSize:12}}>{r.tn}<span className={`badge ${p.bc}`} style={{fontSize:9,marginLeft:4}}>{p.l}</span></div><div style={{fontSize:11,color:'var(--text2)'}}>{r.tc}</div></div><span className="badge b-or" style={{fontSize:9}}>⏳</span></div>)})}</div>);}

function Cts(){const{cts,scts}=useApp();const[q,sQ]=useState('');const fl=cts.filter(c=>!q||c.nm.includes(q)||c.co.includes(q));return(<div style={{paddingTop:16}}><h2 style={{fontSize:18,fontWeight:800,marginBottom:12}}>📖 주소록 <span style={{color:'var(--em)',fontSize:14}}>{cts.length}명</span></h2><input className="inp" value={q} onChange={e=>sQ(e.target.value)} placeholder="검색" style={{marginBottom:12,boxShadow:'var(--sh)'}}/>{fl.map((c,i)=><div key={c.id} className="card au" style={{padding:13,marginBottom:7,animationDelay:`${i*50}ms`}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:40,height:40,borderRadius:20,background:'var(--em-l)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:19}}>{c.av}</div><div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{c.nm}<span style={{fontSize:10,color:'var(--text3)',fontWeight:400,marginLeft:4}}>{c.ps}</span></div><div style={{fontSize:11,color:'var(--text2)'}}>{c.co}·{c.dp}</div><div style={{fontSize:12,color:'var(--em)',fontWeight:600,marginTop:1}}>📞{c.ph}</div></div><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}><button onClick={()=>scts(p=>p.map(x=>x.id===c.id?{...x,fav:x.fav?0:1}:x))} style={{fontSize:15}}>{c.fav?'⭐':'☆'}</button><a href={`tel:${c.ph}`} className="btn btn-p btn-sm" style={{padding:'3px 7px',fontSize:10}}>전화</a></div></div></div>)}</div>);}

function Prof(){const{user,sp,logout}=useApp();return(<div style={{paddingTop:16}}><div className="card" style={{padding:20,textAlign:'center',marginBottom:10}}><div style={{width:52,height:52,borderRadius:26,background:'var(--em-l)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,margin:'0 auto 6px'}}>{user.av}</div><h2 style={{fontSize:18,fontWeight:800}}>{user.name}</h2><p style={{fontSize:12,color:'var(--text2)'}}>{user.pos}·{user.dept}</p><p style={{fontSize:13,fontWeight:600,color:'var(--em)'}}>{user.co}</p><span className="badge b-em" style={{marginTop:4}}>{user.plan}</span></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:10}}>{[{l:'보낸요청',v:'12'},{l:'수락률',v:'67%'},{l:'연결',v:'8명'},{l:'조회',v:'9회'}].map((s,i)=><div key={i} className="card" style={{padding:10,textAlign:'center'}}><div style={{fontSize:15,fontWeight:800,color:'var(--em)'}}>{s.v}</div><div style={{fontSize:9,color:'var(--text3)'}}>{s.l}</div></div>)}</div><div className="card" style={{marginBottom:10}}>{[{i:'🔥',l:'인사이트',a:()=>sp('insights')},{i:'📤',l:'보낸요청',a:()=>sp('sent')},{i:'💎',l:'구독',a:()=>sp('pricing')},{i:'⚙️',l:'설정',a:()=>sp('settings')}].map((m,i)=><div key={i} onClick={m.a} style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:8,borderBottom:i<3?'1px solid var(--bg2)':'none',cursor:'pointer'}}><span style={{fontSize:15}}>{m.i}</span><span style={{fontSize:13,fontWeight:500,flex:1}}>{m.l}</span><span style={{color:'var(--text3)',fontSize:11}}>→</span></div>)}</div><button className="btn btn-o btn-w" onClick={logout} style={{color:'var(--red)',borderColor:'var(--red-l)'}}>로그아웃</button></div>);}

function Set(){const{sp}=useApp();const[s,ss]=useState({a:1,b:1,c:1,d:1,e:1,f:1});const t=k=>ss(p=>({...p,[k]:p[k]?0:1}));const T=({on,fn})=><div onClick={fn} style={{width:40,height:20,borderRadius:10,background:on?'var(--em)':'var(--bg3)',cursor:'pointer',position:'relative',transition:'all .2s',flexShrink:0}}><div style={{width:16,height:16,borderRadius:8,background:'#fff',position:'absolute',top:2,left:on?22:2,transition:'left .2s',boxShadow:'0 1px 2px rgba(0,0,0,.2)'}}/></div>;
return(<div style={{paddingTop:16}}><button className="btn btn-g btn-sm" onClick={()=>sp('profile')} style={{marginBottom:10}}>←뒤로</button><h2 style={{fontSize:18,fontWeight:800,marginBottom:12}}>⚙️설정</h2><div className="card" style={{marginBottom:10}}><div style={{padding:'10px 14px',borderBottom:'1px solid var(--bg2)'}}><h4 style={{fontSize:12,fontWeight:700}}>🔒프라이버시</h4></div>{[{k:'a',l:'검색노출'},{k:'b',l:'영업수신'},{k:'c',l:'구매수신'},{k:'d',l:'협업수신'}].map(x=><div key={x.k} style={{display:'flex',justifyContent:'space-between',padding:'8px 14px'}}><span style={{fontSize:12}}>{x.l}</span><T on={s[x.k]} fn={()=>t(x.k)}/></div>)}</div><div className="card"><div style={{padding:'10px 14px',borderBottom:'1px solid var(--bg2)'}}><h4 style={{fontSize:12,fontWeight:700}}>🔔알림</h4></div>{[{k:'e',l:'연락요청'},{k:'f',l:'주간요약'}].map(x=><div key={x.k} style={{display:'flex',justifyContent:'space-between',padding:'8px 14px'}}><span style={{fontSize:12}}>{x.l}</span><T on={s[x.k]} fn={()=>t(x.k)}/></div>)}</div></div>);}

function Price(){const{sp,st}=useApp();return(<div style={{paddingTop:16}}><button className="btn btn-g btn-sm" onClick={()=>sp('profile')} style={{marginBottom:10}}>←뒤로</button><h2 style={{fontSize:18,fontWeight:800,marginBottom:12}}>💎구독</h2>{[{p:'Free',pr:'무료',c:0,ft:['월5건','기본검색','조회수만']},{p:'Pro',pr:'29,000원/월',c:1,ft:['무제한','조회자공개','인텐트','이직알림','조직도','소개경로']},{p:'Enterprise',pr:'99,000원/팀·월',c:0,ft:['팀관리','API','CRM']}].map((p,i)=><div key={i} className="card" style={{padding:14,marginBottom:7,border:p.c?'2px solid var(--em)':'2px solid transparent'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontWeight:700,fontSize:14}}>{p.p}{p.c?<span className="badge b-em" style={{marginLeft:4}}>현재</span>:null}</div><div style={{fontSize:12,color:'var(--text2)',marginTop:1}}>{p.pr}</div></div>{!p.c&&<button className="btn btn-o btn-sm" onClick={()=>st('정식출시후 지원')}>변경</button>}</div><div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:3}}>{p.ft.map((f,j)=><span key={j} style={{fontSize:10,color:'var(--text3)',background:'var(--bg2)',padding:'2px 6px',borderRadius:3}}>✓{f}</span>)}</div></div>)}</div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
