@keyframes si{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}

.btn-w{width:100%}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

.inp{padding:13px 16px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:15px;background:var(--card);transition:all .2s;width:100%}
.inp:focus{border-color:var(--em);box-shadow:0 0 0 3px rgba(16,185,129,.1)}.inp::placeholder{color:var(--text3)}
.il{font-size:13px;font-weight:650;color:var(--text2);margin-bottom:6px;display:block}

const{setPg}=useApp();const[st,setSt]=useState({s:true,sa:true,pu:true,co:true,iv:true,rc:true,pr:true,rr:true,rm:true,wk:true,dn:false});const tg=k=>setSt(p=>({...p,[k]:!p[k]}));
const Toggle=({on,fn})=><div onClick={fn} style={{width:42,height:22,borderRadius:11,background:on?'var(--em)':'var(--bg3)',cursor:'pointer',position:'relative',transition:'all .2s',flexShrink:0}}><div style={{width:18,height:18,borderRadius:9,background:'#fff',position:'absolute',top:2,left:on?22:2,transition:'left .2s',boxShadow:'0 1px 2px rgba(0,0,0,.15)'}}/></div>;
return(<div style={{paddingTop:16}}>
<button className="btn btn-g btn-sm" onClick={()=>setPg('profile')} style={{marginBottom:14}}>← 뒤로</button>
<h2 style={{fontSize:18,fontWeight:800,marginBottom:16}}>⚙️ 설정</h2>
<div className="card" style={{marginBottom:14}}>
<div style={{padding:'12px 18px',borderBottom:'1px solid var(--bg2)'}}><h4 style={{fontSize:13,fontWeight:700}}>🔒 프라이버시</h4></div>
<div style={{padding:'10px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontSize:13,fontWeight:500}}>검색 노출</div><div style={{fontSize:11,color:'var(--text3)'}}>다른 사용자가 나를 검색 가능</div></div><Toggle on={st.s} fn={()=>tg('s')}/></div>
<div style={{padding:'6px 18px 14px'}}><div style={{fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:6}}>수신 가능 목적</div>
{[{k:'sa',l:'영업'},{k:'pu',l:'구매'},{k:'co',l:'협업'},{k:'iv',l:'투자'},{k:'rc',l:'채용'}].map(x=><div key={x.k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0'}}><span style={{fontSize:12}}>{x.l}</span><Toggle on={st[x.k]} fn={()=>tg(x.k)}/></div>)}
</div></div>
<div className="card">
<div style={{padding:'12px 18px',borderBottom:'1px solid var(--bg2)'}}><h4 style={{fontSize:13,fontWeight:700}}>🔔 알림</h4></div>
{[{k:'pr',l:'연락 요청 수신'},{k:'rr',l:'요청 결과'},{k:'rm',l:'미응답 리마인더'},{k:'wk',l:'주간 요약'},{k:'dn',l:'방해금지 (22~08시)'}].map(x=><div key={x.k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 18px'}}><span style={{fontSize:13}}>{x.l}</span><Toggle on={st[x.k]} fn={()=>tg(x.k)}/></div>)}
</div>
</div>);
}

// ══════ Pricing (PRESERVED + updated features) ══════
function PricingPage(){
const{setPg,showToast}=useApp();
return(<div style={{paddingTop:16}}>
<button className="btn btn-g btn-sm" onClick={()=>setPg('profile')} style={{marginBottom:14}}>← 뒤로</button>
<h2 style={{fontSize:18,fontWeight:800,marginBottom:16}}>💎 구독 관리</h2>
{[{p:'Free',pr:'무료',cur:false,ft:['월 5건','기본 검색']},{p:'Pro',pr:'29,000원/월',cur:true,ft:['무제한','고급필터','👀 조회자 공개','📊 인텐트','🌐 소개경로']},{p:'Enterprise',pr:'99,000원/팀·월',cur:false,ft:['팀관리','API','CRM']}].map((p,i)=>(
<div key={i} className="card" style={{padding:18,marginBottom:8,border:p.cur?'2px solid var(--em)':'2px solid transparent'}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
<div><div style={{fontWeight:700,fontSize:15}}>{p.p} {p.cur&&<span className="badge b-em">현재</span>}</div><div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>{p.pr}</div></div>
{!p.cur&&<button className="btn btn-o btn-sm" onClick={()=>showToast('정식 출시 후 지원됩니다')}>변경</button>}
</div>
<div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:4}}>{p.ft.map((f,j)=><span key={j} style={{fontSize:11,color:'var(--text3)',background:'var(--bg2)',padding:'2px 8px',borderRadius:4}}>✓ {f}</span>)}</div>
</div>))}
</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
